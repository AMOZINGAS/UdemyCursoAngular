<h1>
  Dragonball Page
</h1>

<hr/>

<section class="row">
  <div class="col-12 col-sm-6">
    <h3>Agregar:</h3>
    <input type="text" class="form-control" placeholder="Nombre"/>
    <input type="number" class="form-control mt-2" placeholder="Poder"/>

    <button class="col-12 btn btn-primary">Agregar</button>
  </div>

  <div class="col-12 col-sm-6">
    <h3>Listado</h3>
    <ul>
      @for (character of characters(); track character.id; let idx = $index) {
        <li >
          <span>{{ idx + 1}} - {{ character.name }}</span>
          <strong
            [class.text-danger]="character.power>9000"
            [class.text-warning]="character.power<9000 && character.power>4000"
            [class.text-success]="character.power<4000 && character.power>1000"
              [class.text-secondary]="character.power<1000"
          >

            <!-- [ngClass]="powerClasses()"     -->
            ({{ character.power }})
          </strong>
        </li>
      }
    </ul>
  </div>
</section>
